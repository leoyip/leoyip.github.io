#    commonweal: /404.html || fa fa-heartbeat
#  fancybox: true
#  motion:
#    enable: true
#  footer:
#    since: 2016

# symbols_count_time
symbols_count_time:
  symbols: true
  time: true
  total_symbols: true
  total_time: true
  exclude_codeblock: false

# Deployment
deploy:
  type: git
  repo: git@github.com:leoyip/leoyip.github.io.git
  branch: master
